name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: yarn
      - run: yarn install
      - run: yarn build
